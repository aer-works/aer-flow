# Test configuration for Aer.Mobile.
#
# The `journey` tag marks product-journey tests (#313, spec/journeys.md) — cross-surface promises,
# often red-specs that fail on purpose until a capability lands. They are excluded from the default
# `flutter test` suite (which must stay green) via `--exclude-tags journey`, the mobile analog of
# keeping Aer.Journeys.Tests out of AerFlow.slnx on the .NET side. Run them on demand with
# `pixi run journey-mobile`. See docs/runbooks/journeys.md.
tags:
  journey:
