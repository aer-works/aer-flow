[workspace]
channels = ["conda-forge"]
name = "aer-flow"
platforms = ["win-64", "linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
# Builds external/aer-core's native library. The Aer.Core.csproj ProjectReference (Aer.Flow ->
# Aer.Core, M7 Phase 6's Core Dispatcher) copies this binary from external/aer-core/target/debug/
# into the output directory only if it already exists there, so this must run before any dotnet
# task that touches Aer.Flow. Requires a Rust toolchain on PATH — installed separately, not pixi-
# managed (same convention as the .NET SDK below); GitHub Actions' standard runner images already
# have one.
build-core = { cmd = "cargo build", cwd = "external/aer-core" }

build = { cmd = "dotnet build", depends-on = ["build-core"] }
test = { cmd = "dotnet test", depends-on = ["build-core"] }
fmt = "dotnet format"
fmt-check = "dotnet format --verify-no-changes"
lint = { cmd = "dotnet build -warnaserror", depends-on = ["build-core"] }

# M13 Phase 1 (#107): packs Aer.Cli as an installable global dotnet tool (nupkg), embedding the
# native aer_core library for the current host OS. Not part of `build`/`test`/`lint` — packing
# isn't needed for everyday development, only for the install round trip this phase's runbook-style
# verification exercises (`dotnet tool install --global --add-source bin/pack <PackageId>`).
pack = { cmd = "dotnet pack src/Aer.Cli/Aer.Cli.csproj -o bin/pack", depends-on = ["build-core"] }

# M11 Phase 4 (#87), the milestone's completion gate: a real draft → review workflow run through
# `aer run` against the real, authenticated `claude` CLI, never `pixi run test`'s stub/shell-stub
# path, and never invoked from CI. Requires a `claude` CLI on PATH already logged in (or an API
# key configured for it) and outbound network access. `Aer.Cli.SmokeTests` is deliberately absent
# from AerFlow.slnx so it never builds or runs as a side effect of `build`/`test`/`lint`. See
# docs/runbooks/live-claude-smoke.md before running this.
smoke-claude = { cmd = "dotnet test tests/Aer.Cli.SmokeTests", depends-on = ["build-core"] }

# M12 Phase 4 (#98), this milestone's completion gate: a real draft (`claude`) → review (`agy`)
# workflow, paused at review's declared PausePoint and resumed via `aer decide`, run through the
# real, authenticated `claude` and `agy` CLIs. Same CI exclusion as smoke-claude above — requires
# both CLIs on PATH already logged in (or API keys configured) and outbound network access to both
# vendors' APIs. See docs/runbooks/live-mixed-vendor-smoke.md before running this.
smoke-mixed-vendor = { cmd = "dotnet test tests/Aer.Cli.SmokeTests --filter FullyQualifiedName~LiveMixedVendorPausedRunSmokeTest", depends-on = ["build-core"] }

# M17 Phase 5 (#168), this milestone's completion gate: a real, bounded Claude <-> agy dialogue
# exchange, run through the dialogue worker (Aer.Workers.Dialogue) via the "dialogue" adapter, driven
# through `aer run` against both real, authenticated CLIs. Same CI exclusion as smoke-claude/
# smoke-mixed-vendor above -- requires both CLIs on PATH already logged in (or API keys configured)
# and outbound network access to both vendors' APIs. See docs/runbooks/live-dialogue-smoke.md before
# running this.
smoke-dialogue = { cmd = "dotnet test tests/Aer.Cli.SmokeTests --filter FullyQualifiedName~LiveDialogueSmokeTest", depends-on = ["build-core"] }

# M13 Phase 4 (#110), the milestone's completion gate: unlike smoke-claude/smoke-mixed-vendor
# above, this needs no live vendor auth, so it runs unattended in default CI rather than a gated
# runbook. Packs `aer`, installs it as a real global tool from that local nupkg, runs it against a
# one-step workflow whose `claude` adapter is satisfied by a local stub binary (no network), asserts
# the declared output landed on disk, then uninstalls -- see scripts/verify-pack-roundtrip.sh.
verify-pack = { cmd = "bash scripts/verify-pack-roundtrip.sh", depends-on = ["pack"] }
