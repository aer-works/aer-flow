name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          cache: true

      - name: Check formatting
        run: pixi run fmt-check

      - name: Lint
        run: pixi run lint

      - name: Test
        run: pixi run test
