name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Detects which areas a PR touched, so the heavy jobs below can skip when irrelevant (a .NET-only
  # PR shouldn't wait ~9 min for the Android APK, and a Dart-only PR shouldn't run the .NET legs).
  # pull_request ONLY: paths-filter uses the API there (no checkout needed), but on push it shells
  # out to `git` and dies without a checkout (#410). On push the heavy jobs ignore this job entirely
  # -- their `!cancelled()` if: runs them unconditionally, so main is always validated in full. (A
  # skipped `needs` dependency would normally skip its dependents; those jobs' if: uses a status
  # function to opt out of that -- see their comments.)
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - 'src/**'
              - '!src/Aer.Mobile/**'
              - 'tests/**'
              - 'external/**'
              - '.gitmodules'
              - 'AerFlow.slnx'
              - 'Directory.Build.props'
              - 'coverage.runsettings'
              - 'pixi.toml'
              - 'pixi.lock'
              - '**/packages.lock.json'
              - '.github/workflows/**'
            mobile:
              - 'src/Aer.Mobile/**'
              - '.github/workflows/**'

  test:
    needs: changes
    # PR: run only when .NET-relevant files changed. Push to main: always run (main stays green).
    # !cancelled() makes this a status-check expression, so a skipped `changes` (PR-only, #410)
    # does not skip this job on push.
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.dotnet == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest exists so pixi.toml's declared osx-arm64 support actually builds somewhere —
        # cross-compiling aer_core to aarch64-apple-darwin from the ubuntu-latest runner isn't
        # practical without Apple's SDK. rid/lib-name key each OS's native-lib artifact for the pack
        # job below to gather.
        #
        # It runs only on pushes to main, never on pull requests. Measured on a real run it takes 3
        # of the workflow's 19 wall-clock minutes but 30 of its 51 billable ones, because macOS
        # runners bill at a 10x multiplier — 59% of the cost for 6% of the time. Reserving it for
        # main keeps PR feedback fast and still catches macOS breakage before it can compound, and
        # keeps the workflow affordable should this repository ever go private (the Free tier's
        # 2,000 minutes/month is under one backlog sweep at the unreserved rate). The pack job below
        # is gated identically because it cannot assemble a multi-RID package without this leg's
        # artifact.
        #
        # These leg names are NO LONGER branch-protection required contexts on their own -- the
        # single `ci` gate job at the bottom of this file is (it aggregates these legs + `mobile`).
        # That indirection is deliberate: the heavy jobs are path-filtered, so a leg that
        # legitimately skips on a given PR would, if it were still a required context, sit at
        # "Expected" forever and block the PR -- exactly what happened when the macOS leg moved to
        # main-only while still listed as required (an unexplained CI hang, not an obvious
        # misconfiguration). Rule: require only the always-running `ci` gate; never list a
        # path-filterable leg as a required context.
        include: >-
          ${{ github.event_name == 'push'
              && fromJSON('[{"os":"windows-latest","rid":"win-x64","lib-name":"aer_core.dll"},{"os":"ubuntu-latest","rid":"linux-x64","lib-name":"libaer_core.so"},{"os":"macos-latest","rid":"osx-arm64","lib-name":"libaer_core.dylib"}]')
              || fromJSON('[{"os":"windows-latest","rid":"win-x64","lib-name":"aer_core.dll"},{"os":"ubuntu-latest","rid":"linux-x64","lib-name":"libaer_core.so"}]') }}
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Caches ~/.cargo and external/aer-core/target, keyed off external/aer-core/Cargo.lock, so
      # `pixi run build-core`'s cargo build only recompiles when the submodule pin actually moves.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: external/aer-core

      # run-install/cache are off: the pixi env is deliberately empty (the .NET SDK and, since M7
      # Phase 6, the Rust toolchain used to build the external/aer-core submodule are both system
      # installs, not conda packages — GitHub's standard runner images ship both already), and
      # setup-pixi's `pixi list` step fails hard on an empty environment. `pixi run` performs the
      # (trivial) implicit install on first use instead.
      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          run-install: false
          cache: false

      # Caches NuGet restore keyed off every packages.lock.json in the repo (the xunit test
      # projects — Aer.Flow.Tests, Aer.Adapters.Tests — are the only ones with real
      # PackageReferences). cache-dependency-path must be explicit: cache: true alone only looks
      # for a lock file at the repo root, not recursively.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # M21 Phase 5 (#242): src/Aer.Sidecar's Go toolchain. Explicit setup rather than assuming a
      # runner image already has one -- unlike Rust/.NET, that assumption turned out false for
      # macos-latest (`go: command not found` in CI, found live on PR #244's first run).
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: src/Aer.Sidecar/go.sum

      - name: Check formatting
        run: pixi run fmt-check

      - name: Lint
        run: pixi run lint

      # Isolation guard (#318). The suite redirects AER_HOME to a throwaway temp root
      # (tests/Shared/AerHomeRedirect.cs), so a correct run never touches the real ~/.aer. Snapshot
      # it before and after the run and fail if anything changed: this is what catches a store added
      # later that bypasses AerPaths and writes to the real per-user dir -- the day it lands, not six
      # milestones on when a user finds 48 dead projects. Path list only (not mtimes), so a benign
      # touch of a pre-existing file doesn't false-positive.
      - name: Snapshot ~/.aer before tests
        shell: bash
        run: |
          if [ -d "$HOME/.aer" ]; then
            find "$HOME/.aer" -type f | LC_ALL=C sort > "$RUNNER_TEMP/aer-before.txt"
          else
            : > "$RUNNER_TEMP/aer-before.txt"
          fi

      - name: Test
        run: pixi run test

      - name: Assert ~/.aer untouched by tests
        if: always()
        shell: bash
        run: |
          if [ ! -f "$RUNNER_TEMP/aer-before.txt" ]; then
            echo "Pre-test snapshot missing (an earlier step failed before tests ran); nothing to check."
            exit 0
          fi
          if [ -d "$HOME/.aer" ]; then
            find "$HOME/.aer" -type f | LC_ALL=C sort > "$RUNNER_TEMP/aer-after.txt"
          else
            : > "$RUNNER_TEMP/aer-after.txt"
          fi
          if ! diff -u "$RUNNER_TEMP/aer-before.txt" "$RUNNER_TEMP/aer-after.txt"; then
            echo "::error::Tests changed the real ~/.aer. The AER_HOME redirect leaked -- a store is bypassing AerPaths (see tests/Shared/AerHomeRedirect.cs and src/Aer.Adapters/AerPaths.cs)."
            exit 1
          fi
          echo "~/.aer unchanged by the test run."

      - name: Shutdown dotnet build server
        run: pixi run dotnet build-server shutdown
        if: always()

      # M13 Phase 3 (#109): each OS's own cargo build output (already produced above as a
      # dependency of lint/test) becomes this platform's contribution to the fat multi-RID
      # package the pack job below assembles.
      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.rid }}
          path: external/aer-core/target/debug/${{ matrix.lib-name }}
          if-no-files-found: error

  # M21 Phase 2 (#232): Aer.Mobile is a separate Dart/Flutter toolchain with no dependency on
  # aer_core or the .NET solution, so it gets its own job rather than joining the matrix above.
  # ubuntu-latest's GitHub-hosted image ships the Android SDK already, so `flutter build apk
  # --debug` catches Android toolchain breaks in CI even though the dev machine that wrote this
  # doesn't have the Android SDK installed locally (see docs/runbooks, or #232's own discussion).
  mobile:
    needs: changes
    # PR: run only when mobile files changed. Push to main: always run (main stays green).
    # !cancelled() makes this a status-check expression, so a skipped `changes` (PR-only, #410)
    # does not skip this job on push.
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.mobile == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # M21 Phase 7 (#246): the `tailscale` package's native-asset build hook cross-compiles a Go
      # shared library (for `flutter build apk`'s Android NDK step, and again for `flutter test`'s
      # host-platform stub) and requires Go 1.26+ itself -- ubuntu-latest's preinstalled toolchain
      # is older, same reasoning as the `test` job's own `actions/setup-go@v5` step above.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: src/Aer.Mobile

      - name: Analyze
        run: flutter analyze
        working-directory: src/Aer.Mobile

      # Excludes the `journey` tag: journey tests (#313) are red-specs run on demand via
      # `pixi run journey-mobile`, not in default CI (the .NET half is excluded by living outside
      # AerFlow.slnx). See dart_test.yaml and docs/runbooks/journeys.md.
      - name: Test
        run: flutter test --exclude-tags journey
        working-directory: src/Aer.Mobile

      - name: Build debug APK
        run: flutter build apk --debug
        working-directory: src/Aer.Mobile

  # M13 Phase 3 (#109): gathers the native libs the test matrix above built on all three OSes into
  # one fat nupkg — the same install command (`dotnet tool install --global aer`) then works
  # regardless of host OS. Runs after `test` so it only packs libraries that already passed lint
  # and test on their own platform.
  # Pushes to main only, matching the macOS matrix leg above: this job downloads that leg's
  # native-lib-osx-arm64 artifact, so on a pull request (where macOS does not run) it would fail
  # at the download step rather than merely pack less. It verifies packaging integrity, not the
  # correctness of the change under review, so main is the right place for it.
  pack:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: external/aer-core

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          run-install: false
          cache: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # This job's own host (Linux) is folded in automatically by `pixi run pack`'s build-core
      # dependency + Aer.Core.csproj's existing build-time copy (M7 Phase 6) — only the other two
      # platforms' pre-built binaries need fetching into the artifacts/native-libs/<rid>/
      # convention Aer.Cli.csproj's Phase 3 items read from.
      - name: Download Windows native library
        uses: actions/download-artifact@v4
        with:
          name: native-lib-win-x64
          path: artifacts/native-libs/win-x64

      - name: Download macOS native library
        uses: actions/download-artifact@v4
        with:
          name: native-lib-osx-arm64
          path: artifacts/native-libs/osx-arm64

      - name: Pack aer (multi-RID)
        run: pixi run pack

      - name: Upload packed nupkg
        uses: actions/upload-artifact@v4
        with:
          name: aer-nupkg
          path: bin/pack/*.nupkg

      # M13 Phase 4 (#110), the milestone's completion gate: unattended, since (unlike
      # smoke-claude/smoke-mixed-vendor) it needs no live vendor auth -- install → run against a
      # locally-stubbed claude binary → assert the declared output landed on disk → uninstall.
      - name: Verify installed-tool round trip
        run: pixi run verify-pack

  # The single branch-protection required status check. Aggregates the path-filtered heavy jobs into
  # one always-reporting context, so filtering can skip a leg on a PR without leaving a required
  # check stuck at "Expected" forever. Passes when nothing that ran FAILED -- a path-skipped job
  # counts as fine; only a real failure or cancellation fails the gate. `pack` is deliberately not
  # aggregated here: it is a main-only, post-merge packaging check, not part of PR mergeability.
  ci:
    needs: [changes, test, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        env:
          CHANGES: ${{ needs.changes.result }}
          TEST: ${{ needs.test.result }}
          MOBILE: ${{ needs.mobile.result }}
        run: |
          echo "results: changes=$CHANGES test=$TEST mobile=$MOBILE"
          for r in "$CHANGES" "$TEST" "$MOBILE"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job reported '$r'."
              exit 1
            fi
          done
          echo "CI gate passed (skipped or successful jobs are OK)."
