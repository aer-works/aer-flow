name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - uses: actions/checkout@v4

      # run-install/cache are off: the pixi env is deliberately empty (the .NET
      # SDK is a system install, not a conda package), and setup-pixi's
      # `pixi list` step fails hard on an empty environment. `pixi run` performs
      # the (trivial) implicit install on first use instead.
      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          run-install: false
          cache: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Check formatting
        run: pixi run fmt-check

      - name: Lint
        run: pixi run lint

      - name: Test
        run: pixi run test

      - name: Shutdown dotnet build server
        run: pixi run dotnet build-server shutdown
        if: always()
